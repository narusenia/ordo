[tools]
rust = { version = "1.95", components = "rustfmt,clippy,rust-src" }

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.test]
description = "Run tests"
run = "cargo test"

[tasks.check]
description = "Run cargo check"
run = "cargo check"

[tasks.clippy]
description = "Run clippy lints"
run = "cargo clippy -- -D warnings"

[tasks.fmt]
description = "Check code formatting"
run = "cargo fmt --check"

[tasks."fmt:fix"]
description = "Format code"
run = "cargo fmt"

[tasks.doc]
description = "Build documentation"
run = "cargo doc --no-deps --document-private-items"

[tasks.dev]
description = "Run ordo CLI in debug mode"
run = "cargo run --"
