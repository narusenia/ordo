services:
  test:
    build: .
    entrypoint: cargo
    command: ["test", "--bin", "ordo"]
    working_dir: /ordo
    volumes:
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git-cache:/usr/local/cargo/git

  shell:
    build: .
    entrypoint: /bin/bash
    stdin_open: true
    tty: true
    working_dir: /ordo
    volumes:
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git-cache:/usr/local/cargo/git

volumes:
  cargo-cache:
  cargo-git-cache:
