[tools]
rust = "stable"

[tasks.build]
description = "Build the project"
run = "cargo build"

[tasks.test]
description = "Run tests"
run = "cargo test"

[tasks.check]
description = "Run cargo check"
run = "cargo check"

[tasks.clippy]
description = "Run clippy lints"
run = "cargo clippy -- -D warnings"

[tasks.fmt]
description = "Format code"
run = "cargo fmt"

[tasks.dev]
description = "Run ordo CLI in debug mode"
run = "cargo run --"
